name: campanias-scb-etl
region: sfo

# Worker con scheduler interno para jobs programados
workers:
  - name: etl-scheduler
    github:
      repo: llanosjp/campanias-scb-etl
      branch: main
      deploy_on_push: true
    
    # Comando que ejecuta el scheduler (corre 24/7)
    run_command: python -m etl.scheduler
    
    # Tamaño del worker (Basic XXS: $5/mes)
    instance_size_slug: basic-xxs
    instance_count: 1
    
    # Variables de entorno
    envs:
      # GitLab
      - key: GITLAB_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: GITLAB_PROJECT_ID
        scope: RUN_TIME
        value: "da1534036%2Fcompartido_temporal"
      
      # PostgreSQL
      - key: DB_HOST
        scope: RUN_TIME
        type: SECRET
      - key: DB_PORT
        scope: RUN_TIME
        value: "25060"
      - key: DB_NAME
        scope: RUN_TIME
        value: "defaultdb"
      - key: DB_USER
        scope: RUN_TIME
        value: "doadmin"
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: DB_SSLMODE
        scope: RUN_TIME
        value: "require"
      
      # Opcional: especificar año-mes (formato YYYYMM)
      # Si no se define, usa mes anterior
      - key: YEAR_MONTH
        scope: RUN_TIME
        value: ""

# Schedule configurado en etl/scheduler.py:
# - Carga mensual: día 1 de cada mes a las 2:00 AM UTC
# - Jobs diarios: pendiente agregar (3 procesos)
